<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rock Paper Scissors</title>
</head>
<body style="background-color: #0c0c22;">
  <script>
    "use strict";
    function computerPlay() {
      const options = [
        "Rock",
        "Paper",
        "Scissors"
      ];
      return options[Math.floor(Math.random() * 3)];
    }

    function playRound (){
      const computerChoice = computerPlay();
      const playerChoice = prompt("Type Rock, Paper or Scissors play or type Q to quit", "");
      const output = validate(playerChoice, computerChoice);
      return output;
    }
    function validate(pChoice, cChoice){
      pChoice =(pChoice) ? pChoice[0].toUpperCase() + pChoice.slice(1).toLowerCase() : pChoice;
      if (pChoice == "Rock" || pChoice == "Scissors" || pChoice == "Paper" || pChoice == "Q"){
        if (pChoice !== "Q"){
          if (pChoice === "Rock" && cChoice === "Scissors") {
            return "I chose Scissors and you chose Rock so you win!";
          } else if (pChoice === "Scissors" && cChoice === "Rock") {
            return "I chose Rock and you chose Scissors so I win, sorry.";
          }
          if (pChoice === "Paper" && cChoice === "Rock") {
            return "I chose rock and you chose paper so you win!"
          } else if (pChoice === "Rock" && cChoice === "Paper") {
            return "I chose paper and you chose rock so I win, sorry."
          }
          if (pChoice === "Scissor" && cChoice === "Paper") {
            return "I chose paper and you chose scissor so you win!"
          } else if (pChoice === "Paper" && cChoice === "Scissor"){
            return "I chose scissor and you chose paper so I win, sorry."
          }
        } else {
          return "Thanks for playing! Goodbye"
        }
      } else {
        pChoice = prompt(`Please type "Rock", "Paper" or "Scissors" to play not "${pChoice}"`);
        return validate(pChoice, cChoice);
      }
    }

    function game(){
      let playerPoints = 0;
      let computerPoints = 0;

      for (let i = 0; i < 5; i++) {
        let result = playRound();
        if (result === "Thanks for playing! Goodbye") return result;
        alert(result);
        if (result.includes("I win")) {
          computerPoints++;
        } else if (result.includes("you win")) {
          playerPoints++;
        }
      }
      
      return  (playerPoints > computerPoints) ? 
        `You win with ${playerPoints} while the computer had ${computerPoints} points.`
        : `The computer won with ${computerPoints} while you had ${playerPoints} points.`
    }
    alert(game());
    alert("Thanks for playing! Refresh the page to play again :-)")
  </script>
</body>
</html>
