<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rock Paper Scissors</title>
</head>
<body style="background-color: #0c0c22;">
  <script>
    "use strict";
    function computerPlay() {
      const options = [
        "Rock",
        "Paper",
        "Scissors"
      ];
      return options[Math.floor(Math.random() * 3)];
    }
    const computerSelection = computerPlay();
    let playerSelection = prompt("Type Rock, Paper or Scissors play or type Q to quit", "");
    playerSelection = (playerSelection)? playerSelection[0].toUpperCase() + playerSelection.slice(1).toLowerCase() : playerSelection;
    console.log(playerSelection)
    function playRound (cChoice, pChoice){
      if (pChoice == "Rock" || pChoice == "Scissors" || pChoice == "Paper" || pChoice == "Q"){
        if (pChoice !== "Q"){
          if (pChoice === "Rock" && cChoice === "Scissors") {
            return "I chose Scissors and you chose Rock so you win!";
          } else if (pChoice === "Scissors" && cChoice === "Rock") {
            return "I chose Rock and you chose Scissors so I win, sorry.";
          }
          if (pChoice === "Paper" && cChoice === "Rock") {
            return "I chose paper and you chose rock so you win!"
          } else if (pChoice === "Paper" && cChoice === "Rock") {
            return "I chose rock and you chose paper so I win, sorry."
          }
          if (pChoice === "Scissor" && cChoice === "Paper") {
            return "I chose paper and you chose scissor so you win!"
          } else if (pChoice === "Paper" && cChoice === "Scissor"){
            return "I chose scissor and you chose paper so I win, sorry."
          }
        } else {
          return "Thanks for playing! Goodbye"
        }
      } else {
        if (pChoice == ""){
          return "Thanks for playing! Goodbye"
        }
        pChoice = prompt(`Please type "Rock", "Paper" or "Scissors" to play not "${pChoice}"`);
        return playRound(cChoice, pChoice);
      }
    }
    
    function game(cChoice, pChoice){
      let playerPoints = 0;
      let computerPoints = 0;

      for (let i = 0; i < 5; i++) {
        let result = playRound(cChoice, pChoice);
        if (result.includes("I win")) {
          computerPoints++;
        } else if (result.includes("you win")) {
          playerPoints++;
        } else {
          return "You quit the game"
        }
      }
      
      return  (playerPoints > computerPoints) ? 
        `You win with ${playerPoints}`
        : `The computer won with ${computerPoints}`
    }
    alert(game(computerSelection, playerSelection));
 // alert("Refresh the page to play again :-)");
  </script>
</body>
</html>
